<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <linearGradient id="fcg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#33F5FF"/>
      <stop offset="100%" stop-color="#00D0E0"/>
    </linearGradient>
    <linearGradient id="fmg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF22BB"/>
      <stop offset="100%" stop-color="#DD0099"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" rx="12" fill="#1E1E1E"/>

  <!-- Subtle grid lines (gaming HUD feel) -->
  <g opacity="0.03" stroke="#00F0FF" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <!-- =============================== -->
  <!-- LEFT: CH Monogram (in a circle) -->
  <!-- =============================== -->
  <g transform="translate(30, 28) scale(0.515)">
    <circle cx="256" cy="256" r="248"
            fill="#1A1A1A" stroke="#2D2D2D" stroke-width="3"/>

    <!-- C arc -->
    <path d="M 318 145 A 145 145 0 1 0 318 367"
          fill="none" stroke="#00F0FF" stroke-width="42" stroke-linecap="round"/>

    <!-- Hook barb -->
    <path d="M 318 367 C 298 358, 280 338, 292 315"
          fill="none" stroke="#00E8F0" stroke-width="32" stroke-linecap="round"/>

    <!-- H left vertical -->
    <line x1="318" y1="145" x2="318" y2="367"
          stroke="#00F0FF" stroke-width="40" stroke-linecap="round"/>

    <!-- H right vertical -->
    <line x1="402" y1="145" x2="402" y2="367"
          stroke="#00F0FF" stroke-width="40" stroke-linecap="round"/>

    <!-- H crossbar -->
    <line x1="290" y1="256" x2="430" y2="256"
          stroke="#00F0FF" stroke-width="32" stroke-linecap="round"/>

    <!-- Crosshair reticle -->
    <circle cx="360" cy="256" r="30"
            fill="none" stroke="#FF00AA" stroke-width="5"/>
    <circle cx="360" cy="256" r="5" fill="#FF00AA"/>
    <line x1="360" y1="214" x2="360" y2="230"
          stroke="#FF00AA" stroke-width="5" stroke-linecap="round"/>
    <line x1="360" y1="282" x2="360" y2="298"
          stroke="#FF00AA" stroke-width="5" stroke-linecap="round"/>
    <line x1="318" y1="256" x2="334" y2="256"
          stroke="#FF00AA" stroke-width="5" stroke-linecap="round"/>
    <line x1="386" y1="256" x2="402" y2="256"
          stroke="#FF00AA" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- ================================ -->
  <!-- RIGHT: "CROSSHOOK" wordmark      -->
  <!-- ================================ -->

  <!-- Thin crosshair line through text (behind text) -->
  <line x1="310" y1="148" x2="1160" y2="148"
        stroke="#00F0FF" stroke-width="1" opacity="0.15"/>

  <!-- "CROSS" in cyan -->
  <text x="320" y="185"
        font-family="'Impact', 'Arial Black', 'Liberation Sans Narrow', sans-serif"
        font-weight="900" font-size="120" letter-spacing="4"
        fill="#00F0FF">CROSS</text>

  <!-- "HOOK" in magenta -->
  <text x="740" y="185"
        font-family="'Impact', 'Arial Black', 'Liberation Sans Narrow', sans-serif"
        font-weight="900" font-size="120" letter-spacing="4"
        fill="#FF00AA">HOOK</text>

  <!-- Tagline -->
  <text x="324" y="228"
        font-family="'Consolas', 'DejaVu Sans Mono', 'Courier New', monospace"
        font-weight="400" font-size="18" letter-spacing="5"
        fill="#666666">PROTON/WINE TRAINER &amp; DLL LOADER</text>

  <!-- Accent underline (cyan → magenta transition) -->
  <line x1="324" y1="240" x2="680" y2="240"
        stroke="#00F0FF" stroke-width="2" opacity="0.25"/>
  <line x1="680" y1="240" x2="920" y2="240"
        stroke="#FF00AA" stroke-width="2" opacity="0.25"/>

  <!-- Corner brackets (gaming HUD) -->
  <path d="M 10 30 L 10 10 L 30 10"
        fill="none" stroke="#00F0FF" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <path d="M 1170 10 L 1190 10 L 1190 30"
        fill="none" stroke="#00F0FF" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <path d="M 10 290 L 10 310 L 30 310"
        fill="none" stroke="#FF00AA" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <path d="M 1170 310 L 1190 310 L 1190 290"
        fill="none" stroke="#FF00AA" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
</svg>
