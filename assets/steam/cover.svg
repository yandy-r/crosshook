<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" width="600" height="900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#0A0E18"/>
      <stop offset="50%" stop-color="#0F1520"/>
      <stop offset="100%" stop-color="#1A0E1E"/>
    </linearGradient>
    <radialGradient id="glow-top" cx="50%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-bot" cx="60%" cy="85%" r="45%">
      <stop offset="0%" stop-color="#FF00AA" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FF00AA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#33F5FF"/>
      <stop offset="100%" stop-color="#00D0E0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="900" fill="url(#bg)"/>
  <rect width="600" height="900" fill="url(#glow-top)"/>
  <rect width="600" height="900" fill="url(#glow-bot)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#00F0FF" stroke-width="0.5">
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="0" y1="360" x2="600" y2="360"/>
    <line x1="0" y1="540" x2="600" y2="540"/>
    <line x1="0" y1="720" x2="600" y2="720"/>
    <line x1="150" y1="0" x2="150" y2="900"/>
    <line x1="300" y1="0" x2="300" y2="900"/>
    <line x1="450" y1="0" x2="450" y2="900"/>
  </g>

  <!-- CH Monogram (centered, large, no background rect) -->
  <g transform="translate(110, 100) scale(0.742)">
    <path d="M 318 145 A 145 145 0 1 0 318 367"
          fill="none" stroke="url(#cg)" stroke-width="42" stroke-linecap="round"/>
    <path d="M 318 367 C 298 358, 280 338, 292 315"
          fill="none" stroke="#00E8F0" stroke-width="32" stroke-linecap="round"/>
    <line x1="318" y1="145" x2="318" y2="367"
          stroke="url(#cg)" stroke-width="40" stroke-linecap="round"/>
    <line x1="402" y1="145" x2="402" y2="367"
          stroke="url(#cg)" stroke-width="40" stroke-linecap="round"/>
    <line x1="290" y1="256" x2="430" y2="256"
          stroke="#00F0FF" stroke-width="32" stroke-linecap="round"/>
    <circle cx="360" cy="256" r="30" fill="none" stroke="#FF00AA" stroke-width="5"/>
    <circle cx="360" cy="256" r="5" fill="#FF00AA"/>
    <line x1="360" y1="214" x2="360" y2="230" stroke="#FF00AA" stroke-width="5" stroke-linecap="round"/>
    <line x1="360" y1="282" x2="360" y2="298" stroke="#FF00AA" stroke-width="5" stroke-linecap="round"/>
    <line x1="318" y1="256" x2="334" y2="256" stroke="#FF00AA" stroke-width="5" stroke-linecap="round"/>
    <line x1="386" y1="256" x2="402" y2="256" stroke="#FF00AA" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Separator line -->
  <line x1="150" y1="520" x2="450" y2="520"
        stroke="#00F0FF" stroke-width="1" opacity="0.2"/>

  <!-- "CROSS" text -->
  <text x="300" y="600" text-anchor="middle"
        font-family="'Impact', 'Arial Black', 'Liberation Sans Narrow', sans-serif"
        font-weight="900" font-size="82" letter-spacing="6"
        fill="#00F0FF">CROSS</text>

  <!-- "HOOK" text -->
  <text x="300" y="690" text-anchor="middle"
        font-family="'Impact', 'Arial Black', 'Liberation Sans Narrow', sans-serif"
        font-weight="900" font-size="82" letter-spacing="6"
        fill="#FF00AA">HOOK</text>

  <!-- Tagline -->
  <text x="300" y="755" text-anchor="middle"
        font-family="'Consolas', 'DejaVu Sans Mono', monospace"
        font-size="14" letter-spacing="4"
        fill="#555555">PROTON/WINE TRAINER &amp; DLL LOADER</text>

  <!-- Accent line under tagline -->
  <line x1="150" y1="770" x2="350" y2="770"
        stroke="#00F0FF" stroke-width="1" opacity="0.15"/>
  <line x1="350" y1="770" x2="450" y2="770"
        stroke="#FF00AA" stroke-width="1" opacity="0.15"/>

  <!-- Corner brackets -->
  <path d="M 20 50 L 20 20 L 50 20"
        fill="none" stroke="#00F0FF" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <path d="M 550 20 L 580 20 L 580 50"
        fill="none" stroke="#00F0FF" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <path d="M 20 850 L 20 880 L 50 880"
        fill="none" stroke="#FF00AA" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <path d="M 550 880 L 580 880 L 580 850"
        fill="none" stroke="#FF00AA" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
</svg>
