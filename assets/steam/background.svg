<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3840 1240" width="3840" height="1240">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#080C14"/>
      <stop offset="40%" stop-color="#0D1220"/>
      <stop offset="100%" stop-color="#160A1A"/>
    </linearGradient>
    <radialGradient id="glow-center" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-right" cx="80%" cy="70%" r="35%">
      <stop offset="0%" stop-color="#FF00AA" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FF00AA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#33F5FF"/>
      <stop offset="100%" stop-color="#00D0E0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="3840" height="1240" fill="url(#bg)"/>
  <rect width="3840" height="1240" fill="url(#glow-center)"/>
  <rect width="3840" height="1240" fill="url(#glow-right)"/>

  <!-- Grid pattern -->
  <g opacity="0.025" stroke="#00F0FF" stroke-width="0.5">
    <line x1="0" y1="248" x2="3840" y2="248"/>
    <line x1="0" y1="496" x2="3840" y2="496"/>
    <line x1="0" y1="744" x2="3840" y2="744"/>
    <line x1="0" y1="992" x2="3840" y2="992"/>
    <line x1="480" y1="0" x2="480" y2="1240"/>
    <line x1="960" y1="0" x2="960" y2="1240"/>
    <line x1="1440" y1="0" x2="1440" y2="1240"/>
    <line x1="1920" y1="0" x2="1920" y2="1240"/>
    <line x1="2400" y1="0" x2="2400" y2="1240"/>
    <line x1="2880" y1="0" x2="2880" y2="1240"/>
    <line x1="3360" y1="0" x2="3360" y2="1240"/>
  </g>

  <!-- Large faded CH watermark (right side, subtle) -->
  <g transform="translate(2400, 120) scale(2.0)" opacity="0.03">
    <path d="M 318 145 A 145 145 0 1 0 318 367"
          fill="none" stroke="#00F0FF" stroke-width="42" stroke-linecap="round"/>
    <path d="M 318 367 C 298 358, 280 338, 292 315"
          fill="none" stroke="#00E8F0" stroke-width="32" stroke-linecap="round"/>
    <line x1="318" y1="145" x2="318" y2="367"
          stroke="#00F0FF" stroke-width="40" stroke-linecap="round"/>
    <line x1="402" y1="145" x2="402" y2="367"
          stroke="#00F0FF" stroke-width="40" stroke-linecap="round"/>
    <line x1="290" y1="256" x2="430" y2="256"
          stroke="#00F0FF" stroke-width="32" stroke-linecap="round"/>
    <circle cx="360" cy="256" r="30" fill="none" stroke="#FF00AA" stroke-width="5"/>
    <circle cx="360" cy="256" r="5" fill="#FF00AA"/>
  </g>

  <!-- Decorative horizontal scan lines -->
  <line x1="200" y1="620" x2="3640" y2="620"
        stroke="#00F0FF" stroke-width="0.5" opacity="0.04"/>
  <line x1="100" y1="621" x2="3740" y2="621"
        stroke="#FF00AA" stroke-width="0.5" opacity="0.03"/>

  <!-- Corner brackets -->
  <path d="M 40 80 L 40 40 L 80 40"
        fill="none" stroke="#00F0FF" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <path d="M 3760 40 L 3800 40 L 3800 80"
        fill="none" stroke="#00F0FF" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <path d="M 40 1160 L 40 1200 L 80 1200"
        fill="none" stroke="#FF00AA" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <path d="M 3760 1200 L 3800 1200 L 3800 1160"
        fill="none" stroke="#FF00AA" stroke-width="2" stroke-linecap="round" opacity="0.2"/>

  <!-- Bottom gradient fade to pure dark (helps logo readability when overlaid) -->
  <rect y="900" width="3840" height="340" fill="url(#bg)" opacity="0.5"/>
</svg>
