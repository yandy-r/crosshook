<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" width="920" height="430">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#0A0E18"/>
      <stop offset="50%" stop-color="#0F1520"/>
      <stop offset="100%" stop-color="#1A0E1E"/>
    </linearGradient>
    <radialGradient id="glow-left" cx="25%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-right" cx="80%" cy="60%" r="35%">
      <stop offset="0%" stop-color="#FF00AA" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FF00AA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#33F5FF"/>
      <stop offset="100%" stop-color="#00D0E0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="920" height="430" rx="8" fill="url(#bg)"/>
  <rect width="920" height="430" rx="8" fill="url(#glow-left)"/>
  <rect width="920" height="430" rx="8" fill="url(#glow-right)"/>

  <!-- Subtle grid -->
  <g opacity="0.025" stroke="#00F0FF" stroke-width="0.5">
    <line x1="0" y1="107" x2="920" y2="107"/>
    <line x1="0" y1="215" x2="920" y2="215"/>
    <line x1="0" y1="323" x2="920" y2="323"/>
    <line x1="230" y1="0" x2="230" y2="430"/>
    <line x1="460" y1="0" x2="460" y2="430"/>
    <line x1="690" y1="0" x2="690" y2="430"/>
  </g>

  <!-- CH Monogram (left side) -->
  <g transform="translate(40, 55) scale(0.625)">
    <path d="M 318 145 A 145 145 0 1 0 318 367"
          fill="none" stroke="url(#cg)" stroke-width="42" stroke-linecap="round"/>
    <path d="M 318 367 C 298 358, 280 338, 292 315"
          fill="none" stroke="#00E8F0" stroke-width="32" stroke-linecap="round"/>
    <line x1="318" y1="145" x2="318" y2="367"
          stroke="url(#cg)" stroke-width="40" stroke-linecap="round"/>
    <line x1="402" y1="145" x2="402" y2="367"
          stroke="url(#cg)" stroke-width="40" stroke-linecap="round"/>
    <line x1="290" y1="256" x2="430" y2="256"
          stroke="#00F0FF" stroke-width="32" stroke-linecap="round"/>
    <circle cx="360" cy="256" r="30" fill="none" stroke="#FF00AA" stroke-width="5"/>
    <circle cx="360" cy="256" r="5" fill="#FF00AA"/>
    <line x1="360" y1="214" x2="360" y2="230" stroke="#FF00AA" stroke-width="5" stroke-linecap="round"/>
    <line x1="360" y1="282" x2="360" y2="298" stroke="#FF00AA" stroke-width="5" stroke-linecap="round"/>
    <line x1="318" y1="256" x2="334" y2="256" stroke="#FF00AA" stroke-width="5" stroke-linecap="round"/>
    <line x1="386" y1="256" x2="402" y2="256" stroke="#FF00AA" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- "CROSS" in cyan (stacked vertically) -->
  <text x="400" y="190" text-anchor="start"
        font-family="'Impact', 'Arial Black', 'Liberation Sans Narrow', sans-serif"
        font-weight="900" font-size="88" letter-spacing="6"
        fill="#00F0FF">CROSS</text>

  <!-- "HOOK" in magenta -->
  <text x="400" y="280" text-anchor="start"
        font-family="'Impact', 'Arial Black', 'Liberation Sans Narrow', sans-serif"
        font-weight="900" font-size="88" letter-spacing="6"
        fill="#FF00AA">HOOK</text>

  <!-- Tagline -->
  <text x="403" y="325" text-anchor="start"
        font-family="'Consolas', 'DejaVu Sans Mono', monospace"
        font-size="14" letter-spacing="4"
        fill="#555555">PROTON/WINE TRAINER &amp; DLL LOADER</text>

  <!-- Accent underline -->
  <line x1="400" y1="338" x2="620" y2="338"
        stroke="#00F0FF" stroke-width="1.5" opacity="0.2"/>
  <line x1="620" y1="338" x2="780" y2="338"
        stroke="#FF00AA" stroke-width="1.5" opacity="0.2"/>

  <!-- Corner brackets -->
  <path d="M 14 34 L 14 14 L 34 14"
        fill="none" stroke="#00F0FF" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <path d="M 886 14 L 906 14 L 906 34"
        fill="none" stroke="#00F0FF" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <path d="M 14 396 L 14 416 L 34 416"
        fill="none" stroke="#FF00AA" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <path d="M 886 416 L 906 416 L 906 396"
        fill="none" stroke="#FF00AA" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
</svg>
