# Git hooks (install: `./scripts/setup-dev-hooks.sh` — see https://lefthook.dev/install/).
# Pre-commit mirrors `./scripts/lint.sh --fix --staged && ./scripts/format.sh --staged`,
# re-staging any files the scripts rewrite. Unstaged edits are left alone.
pre-commit:
  piped: true
  commands:
    lint-fix-staged:
      run: ./scripts/lint.sh --fix --staged
      stage_fixed: true
    format-staged:
      run: ./scripts/format.sh --staged
      stage_fixed: true
