# Git hooks (install: `./scripts/setup-dev-hooks.sh` — see https://lefthook.dev/install/).
# Pre-commit mirrors `./scripts/lint.sh --fix --modified && ./scripts/format.sh --modified`,
# re-staging any files the scripts rewrite.
pre-commit:
  piped: true
  commands:
    lint-fix-modified:
      run: ./scripts/lint.sh --fix --modified
      stage_fixed: true
    format-modified:
      run: ./scripts/format.sh --modified
      stage_fixed: true
