name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (clippy + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/crosshook-native/target
          key: rust-lint-${{ runner.os }}-${{ hashFiles('src/crosshook-native/Cargo.lock') }}
          restore-keys: rust-lint-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libssl-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Check formatting
        run: cargo fmt --manifest-path src/crosshook-native/Cargo.toml --all -- --check

      - name: Run clippy
        run: cargo clippy --manifest-path src/crosshook-native/Cargo.toml --all-targets -- -D warnings

  typescript:
    name: TypeScript (biome + tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/crosshook-native/package-lock.json

      - name: Install dependencies
        working-directory: src/crosshook-native
        run: npm ci

      - name: Biome lint and format check
        working-directory: src/crosshook-native
        run: npx @biomejs/biome ci src/

      - name: TypeScript type check
        working-directory: src/crosshook-native
        run: npx tsc --noEmit

      - name: Run Vitest
        working-directory: src/crosshook-native
        run: npx vitest run --coverage

  shell:
    name: Shell (shellcheck + host-gateway)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        run: shellcheck --severity=warning scripts/*.sh scripts/lib/*.sh

      - name: Host-gateway guardrail
        run: ./scripts/check-host-gateway.sh

      - name: Mock coverage contract gate
        run: ./scripts/check-mock-coverage.sh

  smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/crosshook-native/package-lock.json

      - name: Install dependencies
        working-directory: src/crosshook-native
        run: npm ci

      - name: Install Playwright + browser deps
        working-directory: src/crosshook-native
        run: npx playwright install --with-deps chromium

      - name: Run smoke suite
        working-directory: src/crosshook-native
        run: npm run test:smoke
