name: Copilot Setup Steps

# Runs before GitHub's Copilot coding agent firewall engages. Anything the agent
# needs from the network (apt, crates.io, npm registry, Playwright CDN, Chrome
# apt repo, ...) must be fetched or installed here — at agent runtime, outbound
# is blocked except for the repo's allowlisted hosts.
#
# If the agent hits "http block" / "dns block" at runtime, the fix almost
# always belongs in this file, not in a retry.
#
# Job name MUST be `copilot-setup-steps` for GitHub to pick it up.
# `workflow_dispatch` lets maintainers run it manually to debug; Copilot
# invokes it automatically on agent session start.

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    name: Prepare CrossHook agent environment
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (1.95.0 + rustfmt/clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/crosshook-native/package-lock.json

      - name: Install Tauri / build system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            imagemagick \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-bin \
            librsvg2-dev \
            patchelf \
            pkg-config \
            ripgrep \
            shellcheck

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/crosshook-native/target
          key: copilot-cargo-${{ runner.os }}-${{ hashFiles('src/crosshook-native/Cargo.lock') }}
          restore-keys: copilot-cargo-${{ runner.os }}-

      - name: Pre-fetch Cargo dependencies
        working-directory: src/crosshook-native
        run: cargo fetch --locked

      - name: Install npm dependencies (workspace root)
        run: npm ci --prefer-offline --no-audit --no-fund --ignore-scripts || true

      - name: Install npm dependencies (src/crosshook-native)
        working-directory: src/crosshook-native
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Install Playwright browsers + OS deps
        working-directory: src/crosshook-native
        run: npx playwright install --with-deps chromium

      - name: Warm gh CLI auth
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth status
