name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-native:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/crosshook-native/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Linux build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libgtk-3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install native frontend dependencies
        working-directory: src/crosshook-native
        run: npm ci

      - name: Verify native version matches release tag
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          manifests=(
            "src/crosshook-native/Cargo.toml"
            "src/crosshook-native/crates/crosshook-core/Cargo.toml"
            "src/crosshook-native/crates/crosshook-cli/Cargo.toml"
            "src/crosshook-native/src-tauri/Cargo.toml"
          )

          read_version() {
            local manifest="$1"
            awk '
              $0 == "[workspace.package]" { in_workspace=1; next }
              $0 == "[package]" { in_package=1; next }
              /^\[/ { in_workspace=0; in_package=0 }
              (in_workspace || in_package) && $1 == "version" {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            ' "$manifest"
          }

          for manifest in "${manifests[@]}"; do
            manifest_version="$(read_version "$manifest")"

            [[ -n "$manifest_version" ]] || {
              echo "Failed to read version from $manifest" >&2
              exit 1
            }

            [[ "$manifest_version" == "$tag_version" ]] || {
              echo "Release tag version ($tag_version) does not match $manifest version ($manifest_version)" >&2
              exit 1
            }
          done

      - name: Run crosshook-core tests
        env:
          CARGO_HOME: /tmp/cargo-home
          CARGO_TARGET_DIR: /tmp/crosshook-native-target
        run: cargo test --manifest-path src/crosshook-native/Cargo.toml -p crosshook-core

      - name: Build native AppImage
        env:
          DIST_DIR: ${{ github.workspace }}/dist
        run: ./scripts/build-native.sh

      - name: Verify no mock code in production bundle
        run: |
          echo "Checking dist/assets/ for mock-mode sentinel strings..."
          if ! compgen -G "src/crosshook-native/dist/assets/*.js" > /dev/null; then
            echo "::error::No JS assets found under src/crosshook-native/dist/assets/ — build output missing or glob did not match" >&2
            exit 1
          fi
          if grep -rl '\[dev-mock\]\|getMockRegistry\|registerMocks\|MOCK MODE\|__MOCK_VALIDATION_ERROR__' \
              src/crosshook-native/dist/assets/*.js 2>/dev/null; then
            echo "::error::Mock code found in production bundle — refusing to ship" >&2
            echo "This is a CRITICAL security failure. The __WEB_DEV_MODE__ define" >&2
            echo "or the dynamic-import dead-branch failed to eliminate mock code." >&2
            echo "Sentinel strings checked: [dev-mock], getMockRegistry, registerMocks, MOCK MODE, __MOCK_VALIDATION_ERROR__" >&2
            exit 1
          fi
          echo "Bundle clean — no mock strings found"

      - name: Build CLI binary
        env:
          CARGO_TARGET_DIR: src/crosshook-native/target
        run: cargo build --manifest-path src/crosshook-native/Cargo.toml --release -p crosshook-cli

      - name: Package CLI binary
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          tar -czf "dist/crosshook_${version}_linux_amd64.tar.gz" \
            -C src/crosshook-native/target/release crosshook

      - name: Select release assets
        id: release_assets
        run: |
          set -euo pipefail
          appimage_path="dist/CrossHook_${GITHUB_REF_NAME#v}_amd64.AppImage"
          cli_path="dist/crosshook_${GITHUB_REF_NAME#v}_linux_amd64.tar.gz"
          echo "release_appimage=${appimage_path}" >> "$GITHUB_OUTPUT"
          echo "release_cli=${cli_path}" >> "$GITHUB_OUTPUT"

      - name: Generate release body from changelog
        run: ./scripts/render-release-notes.sh "${GITHUB_REF_NAME}" > release-body.md

      - name: Validate release body
        run: ./scripts/validate-release-notes.sh "${GITHUB_REF_NAME}"

      - name: Upload AppImage to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-body.md
          files: |
            ${{ steps.release_assets.outputs.release_appimage }}
            ${{ steps.release_assets.outputs.release_cli }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
