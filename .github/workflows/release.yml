name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-native:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/crosshook-native/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Linux build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libgtk-3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install native frontend dependencies
        working-directory: src/crosshook-native
        run: npm ci

      - name: Verify native version matches release tag
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          manifest_version="$(
            awk '
              $0 == "[workspace.package]" { in_section=1; next }
              in_section && /^\[/ { exit }
              in_section && $1 == "version" { gsub(/"/, "", $3); print $3; exit }
            ' src/crosshook-native/Cargo.toml
          )"

          [[ -n "$manifest_version" ]] || {
            echo "Failed to read native workspace version from src/crosshook-native/Cargo.toml" >&2
            exit 1
          }

          [[ "$manifest_version" == "$tag_version" ]] || {
            echo "Release tag version ($tag_version) does not match native workspace version ($manifest_version)" >&2
            exit 1
          }

      - name: Run crosshook-core tests
        env:
          CARGO_HOME: /tmp/cargo-home
          CARGO_TARGET_DIR: /tmp/crosshook-native-target
        run: cargo test --manifest-path src/crosshook-native/Cargo.toml -p crosshook-core

      - name: Build native AppImage
        env:
          DIST_DIR: ${{ github.workspace }}/dist
        run: ./scripts/build-native.sh

      - name: Upload AppImage to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: dist/*.AppImage
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
