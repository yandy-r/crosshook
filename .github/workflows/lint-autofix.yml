# Applies repo formatters (same as ./scripts/format.sh) and pushes fixes to same-repo PR branches.
# Fork PRs are skipped (token cannot push to forks). CI lint still runs authoritative checks.
name: Lint autofix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: lint-autofix-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  format-and-push:
    name: Format and push fixes
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/crosshook-native/package-lock.json

      - name: Install npm dependencies
        working-directory: src/crosshook-native
        run: npm ci

      - name: Apply format (rustfmt, biome, prettier)
        run: ./scripts/format.sh

      - name: Commit and push if changed
        env:
          PR_HEAD_REF: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet && git diff --cached --quiet; then
            echo "No formatting changes."
            exit 0
          fi
          git add -u -- . ':(exclude)CHANGELOG.md' ':(exclude).claude/PRPs/reports/**' ':(exclude)docs/prps/reviews/**'
          if git diff --cached --quiet; then
            echo "No autofix changes remain after exclusions."
            exit 0
          fi
          git commit -m "chore: apply format (lint-autofix workflow)"
          git push origin "HEAD:${PR_HEAD_REF}"
