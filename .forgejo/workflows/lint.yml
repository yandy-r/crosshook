name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (clippy + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl ca-certificates \
            libgtk-3-dev libssl-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none
          fi
          source "$HOME/.cargo/env"
          rustup toolchain install 1.95.0 --component rustfmt clippy
          rustup default 1.95.0
          echo "PATH=$HOME/.cargo/bin:$PATH" >> "$GITHUB_ENV"

      - name: Check formatting
        run: |
          set -euo pipefail
          source "$HOME/.cargo/env"
          cargo fmt --manifest-path src/crosshook-native/Cargo.toml --all -- --check

      - name: Run clippy
        run: |
          set -euo pipefail
          source "$HOME/.cargo/env"
          cargo clippy --manifest-path src/crosshook-native/Cargo.toml --all-targets -- -D warnings

  typescript:
    name: TypeScript (biome + tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/crosshook-native/package-lock.json

      - name: Install dependencies
        working-directory: src/crosshook-native
        run: npm ci

      - name: Biome lint and format check
        working-directory: src/crosshook-native
        run: npx @biomejs/biome ci src/

      - name: TypeScript type check
        working-directory: src/crosshook-native
        run: npm run typecheck

      - name: Run Vitest
        working-directory: src/crosshook-native
        run: npm run test:coverage

  shell:
    name: Shell (shellcheck + host-gateway)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shell tooling
        run: sudo apt-get update && sudo apt-get install -y ripgrep shellcheck

      - name: Run ShellCheck
        run: shellcheck --severity=warning scripts/*.sh scripts/lib/*.sh

      - name: Host-gateway guardrail
        run: ./scripts/check-host-gateway.sh

      - name: Check legacy palette
        run: ./scripts/check-legacy-palette.sh

      - name: Mock coverage contract gate
        run: ./scripts/check-mock-coverage.sh

  smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/crosshook-native/package-lock.json

      - name: Install dependencies
        working-directory: src/crosshook-native
        run: npm ci

      - name: Install Playwright + browser deps
        working-directory: src/crosshook-native
        run: npx playwright install --with-deps chromium

      - name: Run smoke suite
        working-directory: src/crosshook-native
        run: npm run test:smoke
