name: PR title

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: forgejo-pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Validate Conventional Commit PR title
    runs-on: ubuntu-latest
    steps:
      - name: Validate title
        run: |
          set -euo pipefail

          event_path="${GITHUB_EVENT_PATH:-${FORGEJO_EVENT_PATH:-}}"
          if [[ -z "$event_path" || ! -f "$event_path" ]]; then
            echo "Could not locate workflow event payload" >&2
            exit 1
          fi

          title="$(jq -r '.pull_request.title // empty' "$event_path")"
          if [[ -z "$title" ]]; then
            echo "Could not read pull request title from event payload" >&2
            exit 1
          fi

          placeholder_pattern='^(\[WIP\]|\[Draft\]|Initial plan|WIP:|Draft:)'
          if [[ "$title" =~ $placeholder_pattern ]]; then
            echo "PR title uses a placeholder prefix. Use Forgejo draft PR state instead." >&2
            exit 1
          fi

          conventional_pattern='^(feat|fix|docs|refactor|perf|test|build|ci|chore|style)(\([^)]+\))?!?:[[:space:]].+'
          if [[ ! "$title" =~ $conventional_pattern ]]; then
            echo "PR title must be a Conventional Commit, for example: feat(scope): description" >&2
            exit 1
          fi
