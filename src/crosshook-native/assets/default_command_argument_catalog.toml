catalog_version = 1

[[command_argument]]
id = "force_vulkan"
tokens = ["-force-vulkan"]
label = "Force Vulkan renderer (Unity)"
description = "Pass a Vulkan-forcing switch when the game supports it."
help_text = "Unity standalone flag (-force-vulkan); ignored by non-Unity engines. Many titles ignore it or crash — verify per game before relying on it."
category = "graphics"
advanced = false
community = false
applicable_methods = ["proton_run", "steam_applaunch"]
conflicts_with = ["force_dx11", "force_dx12", "force_opengl"]

[[command_argument]]
id = "force_dx11"
tokens = ["-dx11"]
label = "Force DirectX 11 (Source/Unreal)"
description = "Request a DirectX 11 code path when the game reads launch switches."
help_text = "Common on Source and Unreal titles (-dx11). Unity titles instead use -force-d3d11. Wrong switches can prevent startup or leave you on an unintended renderer."
category = "graphics"
advanced = false
community = false
applicable_methods = ["proton_run", "steam_applaunch"]
conflicts_with = ["force_vulkan", "force_dx12", "force_opengl"]

[[command_argument]]
id = "force_dx12"
tokens = ["-dx12"]
label = "Force DirectX 12 (Source/Unreal)"
description = "Request a DirectX 12 code path when the game reads launch switches."
help_text = "Common on Source and Unreal titles (-dx12). Unity titles instead use -force-d3d12. On Proton/Wine paths DX12 support varies by title and driver stack."
category = "graphics"
advanced = false
community = false
applicable_methods = ["proton_run", "steam_applaunch"]
conflicts_with = ["force_vulkan", "force_dx11", "force_opengl"]

[[command_argument]]
id = "skip_launcher"
tokens = ["--skip-launcher"]
label = "Skip in-game launcher"
description = "Skip a publisher launcher when the game honors the switch."
help_text = "Documented by some publishers (for example Larian's --skip-launcher for Baldur's Gate 3). Useless or harmful on titles without a separate launcher step."
category = "compatibility"
advanced = false
community = false
applicable_methods = ["proton_run", "steam_applaunch"]
conflicts_with = ["nolauncher", "launcher_skip"]

[[command_argument]]
id = "nolauncher"
tokens = ["--nolauncher"]
label = "Skip launcher (nolauncher)"
description = "Skip a publisher launcher on titles that honor the nolauncher switch."
help_text = "Weakly sourced publisher-specific switch. Pick this, --skip-launcher, or --launcher-skip based on what your game documents — not more than one."
category = "compatibility"
advanced = false
community = false
applicable_methods = ["proton_run", "steam_applaunch"]
conflicts_with = ["skip_launcher", "launcher_skip"]

[[command_argument]]
id = "launcher_skip"
tokens = ["--launcher-skip"]
label = "Skip CD Projekt RED launcher (Witcher 3)"
description = "Skip the CD Projekt RED launcher on titles that honor the switch."
help_text = "Documented for The Witcher 3 next-gen (--launcher-skip). Do not confuse with Larian's --skip-launcher or other publisher switches."
category = "compatibility"
advanced = false
community = false
applicable_methods = ["proton_run", "steam_applaunch"]
conflicts_with = ["skip_launcher", "nolauncher"]

[[command_argument]]
id = "force_opengl"
tokens = ["-force-glcore"]
label = "Force OpenGL renderer (Unity)"
description = "Pass an OpenGL-forcing switch when supported."
help_text = "Unity standalone flag (-force-glcore); ignored by non-Unity engines. Occasionally stabilizes older Unity builds on Linux/Proton."
category = "graphics"
advanced = true
community = false
applicable_methods = ["proton_run", "steam_applaunch"]
conflicts_with = ["force_vulkan", "force_dx11", "force_dx12"]
