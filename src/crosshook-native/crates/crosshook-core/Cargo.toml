[package]
name = "crosshook-core"
version = "0.2.2"
edition = "2021"

[dependencies]
directories = "5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
tokio = { version = "1", features = ["fs", "process", "rt", "sync"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "time"] }

[dev-dependencies]
tempfile = "3"
