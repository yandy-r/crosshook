[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

This file is generated with `git-cliff` from the repository history and release tags.
"""
body = """
{% if version %}## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}## [unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | split(pat="\n") | first | upper_first }}{% if commit.id %} ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/yandy-r/choochoo-loader/commit/{{ commit.id }})){% endif %}
{% endfor %}
{% endfor %}

"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
topo_order = false
sort_commits = "oldest"
tag_pattern = "^v?[0-9].*"
skip_tags = "^(alpha|beta|rc)$"

commit_preprocessors = [
  { pattern = "\\((?:refs )?#([0-9]+)\\)", replace = "([#${1}](https://github.com/yandy-r/choochoo-loader/issues/${1}))" },
]

commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^docs?", group = "Documentation" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^perf", group = "Performance" },
  { message = "^test", group = "Tests" },
  { message = "^build", group = "Build" },
  { message = "^ci", group = "CI" },
  { message = "^v[0-9]", group = "Release" },
  { message = "^revert", group = "Reverts" },
  { message = "^chore\\(release\\): prepare", skip = true },
  { message = "^merge:", skip = true },
  { message = "^Merge", skip = true },
  { message = "^[A-Z]", group = "Other" },
]
